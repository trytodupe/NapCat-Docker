name: docker-publish

on:
  workflow_dispatch:
    inputs:
      napcat_ref:
        description: NapCatQQ git ref to build
        required: true
        default: v4.18.2-ws-filter
        type: string
      image_tag:
        description: GHCR image tag to publish
        required: true
        default: v4.18.2-ws-filter
        type: string
  repository_dispatch:
    types:
      - napcat-ws-filter-tag

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/trytodupe/napcat-docker
  NAPCAT_REPO: trytodupe/NapCatQQ

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Docker repository
        uses: actions/checkout@v4

      - name: Checkout NapCatQQ source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NAPCAT_REPO }}
          ref: ${{ github.event.client_payload.napcat_ref || inputs.napcat_ref }}
          path: NapCatQQ

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Detect NapCat build layout
        id: layout
        working-directory: NapCatQQ
        run: |
          set -euo pipefail
          if [ -f pnpm-workspace.yaml ] && [ -d packages/napcat-shell ]; then
            echo "kind=monorepo" >> "$GITHUB_OUTPUT"
          else
            echo "kind=legacy" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.layout.outputs.kind == 'monorepo'
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Build NapCat.Shell.zip (monorepo)
        if: steps.layout.outputs.kind == 'monorepo'
        working-directory: NapCatQQ
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pnpm install
          pnpm --filter napcat-webui-frontend run build
          pnpm run build:shell
          pnpm --filter napcat-plugin-builtin run build
          mv packages/napcat-shell/dist shell-dist
          cd shell-dist
          npm install --omit=dev
          rm -f package-lock.json
          zip -qr "$GITHUB_WORKSPACE/NapCat.Shell.zip" .

      - name: Build NapCat.Shell.zip (legacy)
        if: steps.layout.outputs.kind == 'legacy'
        working-directory: NapCatQQ
        run: |
          set -euo pipefail
          npm install
          cd napcat.webui
          npm install
          cd ..
          npm run build:shell
          cd dist
          npm install --omit=dev
          rm -f package-lock.json
          zip -qr "$GITHUB_WORKSPACE/NapCat.Shell.zip" .

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.event.client_payload.image_tag || inputs.image_tag }}
        run: |
          set -euo pipefail
          docker buildx build \
            --output "type=image,push=true" \
            --platform linux/amd64,linux/arm64 \
            --tag ${GHCR_IMAGE}:${IMAGE_TAG} \
            --file ./Dockerfile \
            .

      - name: GHCR logout
        if: always()
        run: docker logout ghcr.io
